{% if page.toc %}
  <nav class="toc">
    <header><h4 class="nav__title"><i class="fas fa-{{ page.toc_icon | default: 'list' }}"></i> {{ page.toc_label | default: 'Contents' }}</h4></header>
    {% include toc_generate.html html=content sanitize=true class="nav__items" id="markdown-toc" %}
  </nav>
{% endif %}
