project:
  type: website
  output-dir: _site
  render:
    - index.qmd
    - publications.qmd
    - talks.qmd
    - cv.qmd
    - notes/
  resources:
    - images/
    - files/

website:
  title: "Deep Chat of Perplexity"
  description: "Soo Min Kimm — research notes, publications, and talks."
  site-url: "https://somnio-kimm.github.io"
  repo-url: "https://github.com/somnio-kimm/somnio-kimm.github.io"
  search:
    location: navbar
    type: overlay
  navbar:
    background: primary
    pinned: true
    left:
      - href: index.qmd
        text: Home
      - href: publications.qmd
        text: Publications
      - href: talks.qmd
        text: Talks
      - href: cv.qmd
        text: CV
      - href: notes/index.qmd
        text: Notes
    right:
      - icon: github
        href: https://github.com/somnio-kimm
        aria-label: GitHub
      - icon: linkedin
        href: https://www.linkedin.com/in/somnio-kimm/
        aria-label: LinkedIn
  sidebar:
    - id: notes
      title: "Notes"
      style: floating
      collapse-level: 1
      contents:
        - href: notes/index.qmd
          text: "All notes"
        - section: "Mathematics"
          contents:
