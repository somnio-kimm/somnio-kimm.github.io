format:
  html:
    theme:
      light: [cosmo, styles.scss]
      dark: [darkly, styles.scss]
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
    highlight-style: github
    html-math-method: mathjax
    mermaid:
      theme: default
    grid:
      sidebar-width: 320px
