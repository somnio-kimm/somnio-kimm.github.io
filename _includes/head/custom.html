<!-- start custom head snippets -->

<!-- Set theme before first paint to avoid a dark-mode flash (FOUC). -->
<!-- Matches the toggle in assets/js/_main.js: localStorage key "theme", attribute data-theme="dark". -->
<script>
  (function () {
    try {
      var t = localStorage.getItem('theme') ||
        (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    } catch (e) {}
  })();
</script>

<!-- Keep wide equations, tables, and images from overflowing on mobile; make images responsive. -->
<style>
  .page__content table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .page__content mjx-container[display="true"] { overflow-x: auto; overflow-y: hidden; max-width: 100%; }
  .page__content img { max-width: 100%; height: auto; }
  .page__content figure { margin: 1.5em auto; }
  .page__content figcaption { font-size: 0.8em; text-align: center; opacity: 0.8; }
  /* Notes wiki sidebar: collapsible tree with a clear group -> subgroup -> note indentation staircase. */
  .nav__list summary { cursor: pointer; font-weight: bold; }
  .nav__list details { margin-bottom: 0.35em; }
  .nav__notes ul { margin: 0; padding: 0; list-style: none; }
  .nav__notes > ul > li > details > summary { margin-left: 0; }                 /* level 1: group */
  .nav__subgroup { margin-left: 1em; padding-left: 0.55em; border-left: 1px solid rgba(128, 128, 128, 0.3); }
  .nav__subgroup > summary { font-weight: normal; opacity: 0.85; }              /* level 2: subgroup */
  .nav__subgroup > ul { margin-left: 0.9em; }                                   /* level 3: notes */
  .nav__subgroup > ul > li > a { display: block; padding: 0.1em 0; }
  /* Keep the whole sidebar within the viewport so its bottom isn't hidden under the footer. */
  @media (min-width: 925px) {
    .sidebar.sticky { height: calc(100vh - 4em); overflow-y: auto; overscroll-behavior: contain; }
  }
</style>

<!-- LaTeX via MathJax v3 (no ES6 polyfill needed; previous polyfill line removed). -->
<!-- Authoring: write math as $$ ... $$ (works inline and display). Do NOT use single $. -->
<!-- processEnvironments lets you write bare \begin{align}...\end{align} with no \[ \] wrapper. -->
<script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true,
      processEnvironments: true,
      packages: { '[+]': ['ams', 'boldsymbol'] },
      tags: 'ams'
    },
    options: {
      skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'],
      ignoreHtmlClass: 'tex2jax_ignore',
      processHtmlClass: 'tex2jax_process'
    }
  };
</script>
<link rel="preconnect" href="https://cdn.jsdelivr.net"/>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3.2.2/es5/tex-mml-chtml.js"></script>

<!-- Mermaid diagrams: in Markdown just write a normal ```mermaid fenced block. -->
<!-- Client-side only (Jekyll plugins are not allowed on the classic GitHub Pages build). -->
<!-- kramdown+Rouge wraps the block in syntax-highlight <span>s, so we copy textContent -->
<!-- into a clean <pre class="mermaid"> (this strips the spans and decodes entities) before rendering. -->
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
  var dark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  mermaid.initialize({ startOnLoad: false, theme: dark ? 'dark' : 'default', securityLevel: 'strict' });
  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('code.language-mermaid, div.language-mermaid').forEach(function (el) {
      var pre = document.createElement('pre');
      pre.className = 'mermaid';
      pre.textContent = el.textContent;
      (el.closest('div.language-mermaid') || el.closest('pre') || el).replaceWith(pre);
    });
    mermaid.run({ querySelector: 'pre.mermaid' });
  });
</script>

<!-- Native lazy-loading + async decoding for all content images (perf; covers posts + portfolio). -->
<script>
  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('.page__content img').forEach(function (img) {
      if (!img.getAttribute('loading')) img.setAttribute('loading', 'lazy');
      img.setAttribute('decoding', 'async');
    });
  });
</script>

<!-- end custom head snippets -->
